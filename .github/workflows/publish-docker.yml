name: Build & Push SympAuthy docker image to GitHub Container Registry

on:
  workflow_call:
    inputs:
      ref:
        description: Git reference of the commit to build.
        type: string
        required: true
      image:
        description: Name of the produced docker image (including registry).
        type: string
        required: true
      tag:
        description: Tag of the produced docker image.
        type: string
        required: true
      platform:
        description: "Platform identifier (linux-x64 or linux-arm64)"
        type: string
        required: true

jobs:
  publish:
    name: Build & Publish docker image (${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Generate Docker metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: type=raw,value=${{ inputs.tag }}

      - name: Map platform to Docker architecture
        id: arch
        shell: bash
        run: |
          case "${{ inputs.platform }}" in
            linux-x64) echo "docker_platform=linux/amd64" >> $GITHUB_OUTPUT ;;
            linux-arm64) echo "docker_platform=linux/arm64" >> $GITHUB_OUTPUT ;;
            *) echo "Unsupported platform: ${{ inputs.platform }}" && exit 1 ;;
          esac

      - name: Download pre-built binary
        uses: actions/download-artifact@v8
        with:
          name: sympauthy-${{ inputs.platform }}
          path: .github/docker

      - name: Rename binary for Dockerfile
        shell: bash
        run: mv .github/docker/sympauthy-${{ inputs.platform }} .github/docker/sympauthy

      - id: build
        name: Build & Push docker image (${{ inputs.platform }})
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .github/docker
          file: .github/docker/Dockerfile
          platforms: ${{ steps.arch.outputs.docker_platform }}
          tags: ${{ inputs.image }}:${{ inputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
