name: Build SympAuthy native binary

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        type: string
        required: true
      platform:
        description: "Platform identifier (linux-x64, linux-arm64, macos-x64, macos-arm64, windows-x64)"
        type: string
        required: true

jobs:
  build:
    name: Build native binary (${{ inputs.platform }})
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Create sympauthy-flow directory into resources
        shell: bash
        run: mkdir -p server/src/main/resources/sympauthy-flow

      - name: Install sympauthy-flow into resources
        uses: actions/download-artifact@v8
        with:
          name: sympauthy-flow-dist
          path: server/src/main/resources/sympauthy-flow

      - name: Create sympauthy-admin directory into resources
        shell: bash
        run: mkdir -p server/src/main/resources/sympauthy-admin

      - name: Install sympauthy-admin into resources
        uses: actions/download-artifact@v8
        with:
          name: sympauthy-admin-dist
          path: server/src/main/resources/sympauthy-admin

      - name: Extract Java version from build script
        id: java-version
        shell: bash
        run: |
          VERSION=$(grep -E 'JavaVersion\.VERSION_[0-9]+' server/build.gradle.kts | grep -oE '[0-9]+$')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper

      - name: Setup GraalVM for JDK ${{ steps.java-version.outputs.version }}
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ steps.java-version.outputs.version }}
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        shell: bash
        run: gradle :server:nativeCompile

      - name: Prepare binary for upload
        shell: bash
        run: |
          BINARY_NAME="sympauthy-${{ inputs.platform }}"
          if [[ "${{ inputs.platform }}" == windows-* ]]; then
            cp server/build/native/nativeCompile/server.exe "${BINARY_NAME}.exe"
          else
            cp server/build/native/nativeCompile/server "${BINARY_NAME}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: sympauthy-${{ inputs.platform }}
          path: sympauthy-${{ inputs.platform }}*
