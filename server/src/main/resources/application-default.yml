# This configuration contains a default configuration allowing to start SympAuhty with minimal
# additional configurations.

advanced:
  authorization-webhook:
    timeout: 5s
  hash:
    block-size: 8
    cost-parameter: 16_384
    key-length: 32
    parallelization-parameter: 1
    salt-length: 256
  invitation:
    token-length: 32
    default-expiration: 7d
    max-expiration: 30d
    hash:
      block-size: 8
      cost-parameter: 16_384
      key-length: 32
      parallelization-parameter: 1
      salt-length: 256
  jwt:
    public-alg: es256
    access-alg: es256
    private-alg: hs256
  keys-generation-strategy: autoincrement
  validation-code:
    length: 6
    resend-delay: 1m
    expiration: 10m

audiences:
  default: {}

auth:
  authorization-code:
    expiration: 30m
  user-merging-enabled: false
  token:
    access-expiration: 1h
    refresh-enabled: true
    refresh-expiration: 30d
    dpop-required: false

templates:
  claims:
    default:
      acl:
        readable-with-client-scopes-unconditionally:
          - "users:claims:read"
        writable-with-client-scopes-unconditionally:
          - "users:claims:write"
    openid:
      enabled: "false"
      acl:
        readable-by-user-when-consented: "true"
        writable-by-user-when-consented: "true"
        readable-by-client-when-consented: "true"
        writable-by-client-when-consented: "false"
  clients:
    default:
      audience: default
      default-scopes:
        - openid
        - profile
      flow: default
      allowed-grant-types:
        - authorization_code
        - refresh_token
        - client_credentials

claims:
  name:
    template: openid
    type: string
    group: identity
    acl:
      consent-scope: profile
  given_name:
    template: openid
    type: string
    group: identity
    acl:
      consent-scope: profile
  family_name:
    template: openid
    type: string
    group: identity
    acl:
      consent-scope: profile
  middle_name:
    template: openid
    type: string
    group: identity
    acl:
      consent-scope: profile
  nickname:
    template: openid
    type: string
    acl:
      consent-scope: profile
  preferred_username:
    template: openid
    type: string
    acl:
      consent-scope: profile
  profile:
    template: openid
    type: string
    acl:
      consent-scope: profile
  picture:
    template: openid
    type: string
    acl:
      consent-scope: profile
  website:
    template: openid
    type: string
    acl:
      consent-scope: profile
  email:
    template: openid
    type: email
    verified-id: email_verified
    acl:
      consent-scope: email
  gender:
    template: openid
    type: string
    acl:
      consent-scope: profile
  birth_date:
    template: openid
    type: date
    acl:
      consent-scope: profile
  zoneinfo:
    template: openid
    type: timezone
    acl:
      consent-scope: profile
  locale:
    template: openid
    type: string
    acl:
      consent-scope: profile
  phone_number:
    template: openid
    type: phone-number
    verified-id: phone_number_verified
    acl:
      consent-scope: phone
  street_address:
    template: openid
    type: string
    group: address
    acl:
      consent-scope: address
  locality:
    template: openid
    type: string
    group: address
    acl:
      consent-scope: address
  region:
    template: openid
    type: string
    group: address
    acl:
      consent-scope: address
  postal_code:
    template: openid
    type: string
    group: address
    acl:
      consent-scope: address
  country:
    template: openid
    type: string
    group: address
    acl:
      consent-scope: address

mfa:
  required: false
  totp:
    enabled: false

features:
  allow-access-to-client-without-scope: false
  email-validation: false
  grant-unhandled-scopes: false
  print-details-in-error: false

ui:
  display-name: SympAuthy
  mail:
    email-background-color: "#f3f3f5"
    primary-color: ""
    background-color: "#ffffff"
    on-primary-color: ""
    on-background-color: "#3C3F44"
