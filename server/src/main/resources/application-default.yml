# This configuration contains a default configuration allowing to start SympAuhty with minimal
# additional configurations.

advanced:
  authorization-webhook:
    timeout: 5s
  hash:
    block-size: 8
    cost-parameter: 16_384
    key-length: 32
    parallelization-parameter: 1
    salt-length: 256
  jwt:
    public-alg: es256
    access-alg: es256
    private-alg: es256
  keys-generation-strategy: autoincrement
  validation-code:
    length: 6
    resend-delay: 1m
    expiration: 10m

auth:
  authorization-code:
    expiration: 30m
  user-merging-enabled: false
  token:
    access-expiration: 1h
    refresh-enabled: true
    refresh-expiration: 30d
    dpop-required: false

templates:
  clients:
    default:
      default-scopes:
        - openid
        - profile
      flow: default
      allowed-grant-types:
        - authorization_code
        - refresh_token
        - client_credentials

mfa:
  required: false
  totp:
    enabled: false

features:
  allow-access-to-client-without-scope: false
  email-validation: false
  grant-unhandled-scopes: false
  print-details-in-error: false

ui:
  display-name: SympAuthy
  mail:
    email-background-color: "#f3f3f5"
    primary-color: ""
    background-color: "#ffffff"
    on-primary-color: ""
    on-background-color: "#3C3F44"
