# This configuration creates an admin client used by the admin UI application.
# End-users authenticating through it are granted admin scopes via a scope granting rule
# that evaluates the is_sympauthy_admin claim. The bootstrap invitation sets this claim
# to true for the first admin user.
#
# Activate this environment by adding "admin" to MICRONAUT_ENVIRONMENTS (e.g. "default,admin").

admin:
  enabled: true
  integrated-ui: true
  audience: admin

audiences:
  admin:
    sign-up-enabled: false
    invitation-enabled: true

claims:
  is_sympauthy_admin:
    type: boolean
    audience: admin

clients:
  admin:
    audience: admin
    public: true
    allowed-grant-types:
      - authorization_code
      - refresh_token
    allowed-redirect-uris:
      - "${urls.root}/admin/callback"
    allowed-scopes:
      - openid
      - profile
      - admin:config:read
      - admin:users:read
      - admin:users:write
      - admin:users:delete
      - admin:consent:read
      - admin:consent:write
      - admin:invitations:read
      - admin:invitations:write
    default-scopes:
      - openid
      - profile
      - admin:config:read
      - admin:users:read
      - admin:users:write
      - admin:users:delete
      - admin:consent:read
      - admin:consent:write
      - admin:invitations:read
      - admin:invitations:write

rules:
  user:
    - scopes:
        - admin:config:read
        - admin:users:read
        - admin:users:write
        - admin:users:delete
        - admin:consent:read
        - admin:consent:write
        - admin:invitations:read
        - admin:invitations:write
      expressions:
        - 'CLAIM("is_sympauthy_admin") = "true"'

invitations:
  first-admin:
    audience: admin
    url-template: "${urls.root}/admin/register?invitation_token={token}"
    claims:
      is_sympauthy_admin: "true"
    note: Bootstrap invitation for the first admin user
