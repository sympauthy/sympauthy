# This configuration creates an admin client used by the admin UI application.
# End-users authenticating through it can be granted admin scopes via scope granting rules.
#
# Activate this environment by adding "admin" to MICRONAUT_ENVIRONMENTS (e.g. "default,admin").

admin:
  enabled: true
  integrated-ui: true
  audience: admin

audiences:
  admin: {}

clients:
  admin:
    audience: admin
    public: true
    allowed-grant-types:
      - authorization_code
      - refresh_token
    allowed-redirect-uris:
      - "${urls.root}/admin/callback"
    allowed-scopes:
      - openid
      - profile
      - admin:config:read
      - admin:users:read
      - admin:users:write
      - admin:users:delete
      - admin:consent:read
      - admin:consent:write
    default-scopes:
      - openid
      - profile
      - admin:config:read
      - admin:users:read
      - admin:users:write
      - admin:users:delete
      - admin:consent:read
      - admin:consent:write
